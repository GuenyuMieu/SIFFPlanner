<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上影节排片小助手</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    /* ======== Top Bar ======== */
    #top-bar {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      max-width: 280px;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    #cart-badge-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #cart-badge {
      background: #e76f24;
      color: #fff;
      border-radius: 50%;
      min-width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
    }

    #show-timeline-btn,
    #filter-btn {
      padding: 6px 16px;
      font-size: 0.9rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #4aa0eb;
      color: #fff;
    }

    #show-timeline-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #settings-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #666;
      margin-left: auto;
    }

    /* Cart Dropdown */
    #cart-dropdown {
      display: none;
      position: absolute;
      top: 30px;
      left: 0;
      width: 320px;
      max-height: 400px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      z-index: 500;
      font-size: 0.85rem;
      padding: 8px 0;
    }

    #cart-dropdown .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    #cart-dropdown .cart-item:hover {
      background: #f8f8f8;
    }

    #cart-dropdown .cart-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #cart-dropdown .cart-item-del {
      cursor: pointer;
      color: #e76f24;
      font-size: 1.1rem;
      padding: 0 4px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    #cart-dropdown .cart-empty {
      padding: 16px;
      text-align: center;
      color: #999;
    }

    #cart-dropdown .cart-header {
      padding: 6px 12px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }

    /* ======== Main Container ======== */
    #main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ======== Browse View ======== */
    #browse-view {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    #browse-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #filter-panel {
      width: 280px;
      min-width: 200px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      background: #fafafa;
      display: flex;
      flex-direction: column;
    }

    #movie-grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    #movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    #no-movies-msg {
      display: none;
      text-align: center;
      color: #999;
      padding: 40px;
      font-size: 1rem;
    }

    /* Movie Card */
    .movie-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 14px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .movie-card:hover {
      border-color: #4aa0eb;
      box-shadow: 0 2px 8px rgba(74, 160, 235, 0.12);
    }

    .movie-card.interested {
      border-color: #e76f24;
      background: #fef9f5;
    }

    .movie-card-left {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
    }

    .movie-card-body {
      flex: 1;
      min-width: 0;
    }

    .movie-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 0.78rem;
      color: #999;
      margin-bottom: 2px;
    }

    .movie-meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .movie-unit-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      background: #e8f0fe;
      color: #4aa0eb;
      font-size: 0.72rem;
    }

    .movie-count-tag {
      font-size: 0.75rem;
      color: #aaa;
    }

    .interest-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      line-height: 28px;
      text-align: center;
      background: #eee;
      color: #999;
      z-index: 5;
      transition: all 0.2s;
    }

    .interest-toggle:hover {
      background: #e76f24;
      color: #fff;
    }

    .interest-toggle.active {
      background: #e76f24;
      color: #fff;
    }

    /* ======== Filter Panel ======== */
    .tag-group {
      margin: 0;
    }

    .tag-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
    }

    .tag-header {
      cursor: pointer;
      font-weight: bold;
      user-select: none;
      font-size: 0.9rem;
    }

    .group-actions {
      display: flex;
      gap: 4px;
    }

    .group-actions button {
      padding: 2px 6px;
      font-size: 0.75rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .btn-select-all {
      background: #4aa0eb;
      color: #fff;
    }

    .btn-deselect-all {
      background: #e76f24;
      color: #fff;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      max-height: 150px;
      overflow-y: auto;
      padding: 6px 8px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .tag-list.collapsed {
      display: none;
    }

    .tag-list .tag {
      padding: 3px 7px;
      margin: 2px 3px;
      background: #eee;
      border-radius: 10px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }

    .tag-list .tag:hover {
      background: #d1eaff;
    }

    .tag-list .tag.selected {
      background: #4aa0eb;
      color: #fff;
    }

    .cinema-filter-row {
      padding: 4px 8px; font-size: 0.8rem; border-bottom: 1px solid #eee;
    }
    .cinema-filter-row .cf-row {
      display: flex; align-items: center; gap: 4px; margin-bottom: 3px;
    }
    #radius-input::-webkit-outer-spin-button,
    #radius-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #radius-input { -moz-appearance: textfield; }

    .cinema-filter-row select {
      flex: 1;
      min-width: 80px;
      font-size: 0.8rem;
    }

    .cinema-filter-row input {
      width: 50px;
      font-size: 0.8rem;
      padding: 2px 4px;
    }

    .cinema-filter-row button {
      padding: 2px 6px;
      font-size: 0.75rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    /* ======== Timeline View ======== */
    #timeline-view {
      display: none;
      flex-direction: column;
      width: 100%;
    }

    #timeline-wrapper-tv {
      min-height: 100px;
      max-height: 40vh;
      overflow-y: auto;
      padding: 10px 16px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
    }

    #time-scale {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 4px;
      padding: 0 5px;
    }

    #timeline-content {
      position: relative;
    }

    .timeline-row {
      position: relative;
      height: 40px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      margin-top: 5px;
      border-radius: 4px;
    }

    .movie-item {
      position: absolute;
      top: 0;
      height: 100%;
      background: #82cfff;
      border: 1px solid #4aa0eb;
      border-radius: 4px;
      color: #fff;
      font-size: 0.82rem;
      text-align: center;
      line-height: 40px;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .movie-item.selected {
      outline: 3px dashed #000;
      outline-offset: -3px;
      box-shadow: 0 0 0 4px rgba(0,0,0,0.35);
      z-index: 2;
    }

    #divider {
      height: 5px;
      background: #ccc;
      cursor: row-resize;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    #bottom-wrapper {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    #left-panel {
      width: 30%;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      background: #fff;
    }

    #controls {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    #controls button {
      padding: 8px 14px;
      font-size: 0.9rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #show-map-btn {
      background: #4aa0eb;
      color: #fff;
    }

    #btn-clear-selection {
      background: #e76f24;
      color: #fff;
    }

    #controls button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #itinerary-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #f8fafc;
      color: #1f2937;
      font-size: 0.84rem;
    }

    .itinerary-empty {
      padding: 14px 12px;
      color: #7c8798;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      text-align: center;
    }

    .itinerary-day {
      margin-bottom: 10px;
    }

    .itinerary-day-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-weight: 700;
      color: #0f172a;
    }

    .itinerary-day-count {
      color: #64748b;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .itinerary-summary {
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .itinerary-summary-title {
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .itinerary-summary-meta {
      color: #64748b;
      line-height: 1.5;
    }

    .itinerary-item {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-left: 3px solid #2563eb;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .itinerary-item.same-cinema {
      border-left-color: #0f766e;
    }

    .itinerary-item.conflict {
      display: block;
      border-left-color: #dc2626;
      background: #fff7f7;
    }

    .itinerary-time {
      color: #2563eb;
      font-weight: 700;
      white-space: nowrap;
    }

    .itinerary-title {
      color: #111827;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .itinerary-meta {
      margin-top: 3px;
      color: #64748b;
      line-height: 1.45;
    }

    .itinerary-gap {
      margin: -1px 0 6px 82px;
      color: #7c8798;
      font-size: 0.76rem;
    }

    .itinerary-transfer {
      margin: -1px 0 8px 82px;
      padding: 6px 8px;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #64748b;
      font-size: 0.76rem;
      line-height: 1.45;
    }

    .itinerary-transfer.tight {
      border-color: #fed7aa;
      background: #fff7ed;
      color: #c2410c;
    }

    .itinerary-transfer.ready {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .itinerary-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      margin-left: 6px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .itinerary-badge.warn {
      background: #fee2e2;
      color: #b91c1c;
    }

    .itinerary-screening {
      padding: 5px 0;
      border-top: 1px solid #eef2f7;
    }

    .itinerary-screening:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .alternative-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .alt-choice-btn {
      width: 100%;
      text-align: left;
      padding: 7px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #334155;
      cursor: pointer;
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .alt-choice-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 700;
    }

    .alt-choice-btn:hover {
      border-color: #93c5fd;
    }

    #map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    :root {
      --surface: #ffffff;
      --surface-muted: #f6f8fb;
      --line: #dfe5ee;
      --text-main: #172033;
      --text-muted: #697386;
      --accent: #2563eb;
      --accent-hot: #f97316;
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    body {
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #eef2f7;
      color: var(--text-main);
    }

    #page-title {
      background: linear-gradient(135deg, #111827, #1d4ed8) !important;
      padding: 12px 22px !important;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
    }

    #top-bar {
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    #top-bar button,
    #controls button,
    #browse-actions button,
    #excel-dropdown-btn,
    #date-select,
    #search-input {
      border-radius: 8px !important;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    #top-bar button:hover,
    #controls button:not(:disabled):hover,
    #browse-actions button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.14);
    }

    #show-timeline-btn,
    #filter-btn,
    #show-map-btn,
    #export-itinerary-btn {
      background: var(--accent) !important;
      color: #fff;
    }

    #btn-clear-selection {
      background: var(--accent-hot) !important;
    }

    #controls button:disabled {
      background: #cbd5e1 !important;
      color: #64748b;
      box-shadow: none;
      transform: none;
    }

    #filter-panel,
    #left-panel,
    #timeline-wrapper-tv {
      background: var(--surface-muted);
      border-color: var(--line);
    }

    .movie-card {
      border-color: #e6ebf2;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .movie-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
      transform: translateY(-1px);
    }

    .movie-card.interested {
      border-color: var(--accent-hot);
      background: #fff7ed;
    }

    .tag-list .tag {
      border-radius: 999px;
      background: #e8edf5;
      color: #334155;
    }

    .tag-list .tag.selected {
      background: var(--accent);
    }

    .timeline-row {
      background: #eef2f7;
      border-color: #dbe3ee;
      border-radius: 8px;
    }

    .movie-item {
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
    }

    .movie-item.selected {
      outline: 3px solid #111827;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2), 0 8px 20px rgba(15, 23, 42, 0.18);
    }

    /* ======== Other Showtimes Modal ======== */
    #other-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 2000;
    }

    #other-modal-dialog {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      max-width: 500px;
      max-height: 70vh;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      overflow-y: auto;
      z-index: 2001;
      font-size: 0.9rem;
    }

    #other-modal-header {
      padding: 12px 16px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #other-modal-close {
      cursor: pointer;
      font-size: 1.1rem;
      color: #888;
    }

    #other-modal-content {
      padding: 12px;
    }

    /* ======== Settings Modal ======== */
    #settings-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 3000;
    }

    #settings-modal-dialog {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      max-width: 90vw;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 3001;
    }
  </style>
  <link href="//unpkg.com/layui@2.11.5/dist/css/layui.css" rel="stylesheet">
  <script src="//unpkg.com/layui@2.11.5/dist/layui.js"></script>
  <script>
    window._AMapSecurityConfig = { securityJsCode: '{{ amap_security_code }}' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key={{ amap_key }}"></script>
</head>

<body>

  <!-- ======== Page Title ======== -->
  <div id="page-title"
    style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:8px 20px;flex-shrink:0;display:flex;align-items:center;gap:16px;">
    <span style="font-size:1.15rem;font-weight:bold;">🎬 上海国际电影节排片小助手</span>
    <a href="https://github.com/GuenyuMieu/SIFFPlanner" target="_blank" title="GitHub 项目地址"
       style="margin-left:auto;color:#fff;text-decoration:none;font-size:0.95rem;display:flex;align-items:center;gap:6px;opacity:0.85;transition:opacity 0.2s;"
       onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">

  <!-- ======== Settings Modal ======== -->
  <div id="settings-modal-overlay"></div>
  <div id="settings-modal-dialog">
    <div style="padding:14px 16px;font-size:1.1rem;font-weight:bold;border-bottom:1px solid #ddd;">高德地图 Key 配置</div>
    <div style="padding:16px;font-size:0.9rem;">

        <label style="display:block;margin-bottom:4px;">Web服务 Key</label>

          style="width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
      </div>

        <label style="display:block;margin-bottom:4px;">Web端(JSAPI) Key</label>

          style="width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">

        <button id="btn-settings-cancel"
          style="padding:8px 16px;background:#ddd;border:none;border-radius:4px;cursor:pointer;">取消</button>
        <button id="btn-settings-save"
          style="padding:8px 16px;background:#4aa0eb;color:#fff;border:none;border-radius:4px;cursor:pointer;">保存</button>
      </div>

  <script>
    console.log("=== 页面脚本开始执行 ===");

    // ======== LayUI Upload ========
    try {
    layui.use(['upload', 'layer'], function () {
      var upload = layui.upload;
      var layer = layui.layer;
      upload.render({
        elem: '#uploadExcelBtn',
        url: '/upload_excel',
        accept: 'file',
        exts: 'xls|xlsx',
        field: 'file',
        before: function (obj) {
          const file = obj.file || (obj.files && obj.files[0]) || null;
          const name = (file && file.name) || '';
          if (name && !name.includes('上海国际电影节')) {
            layer.alert('❌ 文件名「' + name + '」不包含「上海国际电影节」，请确认上传的是正确的排片表', { icon: 2 });
            return false;
          }
        },
        done: function (res) {
          if (res.status === 'ok') {
            layer.msg('上传成功，数据已更新', { icon: 1 });
            setTimeout(function () { window.location.reload(true); }, 800);
          } else {
            layer.alert('上传失败：' + (res.message || '未知错误'), { icon: 2 });
          }
        },
        error: function () { layer.alert('上传请求失败，请检查网络连接', { icon: 2 }); }
      });
    });
    } catch(e) {
      console.warn("LayUI上传组件初始化失败（CDN可能不可用）:", e.message);
    }

    // ======== Global State ========
    const amapConfigured = {{ 'true' if amap_configured else 'false' }};
    const uniqueMoviesRaw = JSON.parse('{{ unique_movies | tojson | safe }}');
    const timelineDataAll = JSON.parse('{{ timeline_data | tojson | safe }}');

    let interestList = new Set();          // Set of movie keys
    let filteredTimelineData = {};          // from /api/timeline_for_movies
    let filteredDates = [];                 // sorted dates
    let currentMode = 'timeline';          // start in timeline mode
    let currentDate = null;                // active date tab in timeline mode
    let selectedMovies = [];               // selected screenings for route planning
    let lastRouteData = null;              // latest route result for itinerary export
    let alternativeChoices = {};           // conflict group key -> selected screening id
    let selectionSequence = 0;             // preserves first-picked order for alternatives
    let routeNeedsRefresh = false;         // route data is stale after itinerary switches

    // Filter state
    let selectedDates = new Set();
    let selectedDirectors = new Set();
    let selectedUnits = new Set();
    let selectedCinemas = new Set();
    let searchQuery = '';

    // ======== Init ========
    function initPage() {
      try {
      console.log("initPage start, amapConfigured:", amapConfigured);

      fetch("/api/config").then(r => r.json()).then(cfg => {
        if (!cfg.configured) {
          const banner = document.createElement("div");
          banner.style.cssText = "background:#fff3cd;color:#856404;padding:6px 16px;font-size:0.85rem;border-bottom:1px solid #ffeeba;";
          banner.innerHTML = '⚠️ 高德Key未配置，地图功能不可用。点击右上角⚙️配置。';
          document.getElementById("top-bar").after(banner);
        }
      }).catch(() => { });

      console.log("calling initMap...");
      initMap();
      console.log("calling buildFilterPanel...");
      buildFilterPanel();
      console.log("calling bindEvents...");
      bindEvents();
      console.log("calling initExcelSelector...");
      initExcelSelector();
      updateSelectionActions();

      // Default: all movies selected, start in timeline mode
      interestList = new Set(uniqueMoviesRaw.map(m => m.key));
      updateCartBadge();
      console.log("calling showTimelineMode...");
      showTimelineMode();
      console.log("initPage done");
      } catch(e) {
        console.error("initPage error:", e.message, e.stack);
        alert("页面初始化失败: " + e.message);
      }
    }

    let excelCurrent = '';

    function refreshExcelSelector() {
      const btn = document.getElementById('excel-dropdown-btn');
      const dd = document.getElementById('excel-dropdown');
      fetch('/api/excel_files').then(r => r.json()).then(data => {
        excelCurrent = data.current || '';
        const festivalFiles = (data.files || []).filter(f => f.name.includes('上海国际电影节'));
        btn.innerText = excelCurrent || '（无排片文件，请上传）';
        btn.title = excelCurrent || '';

        dd.innerHTML = '';
        if (festivalFiles.length === 0) {
          dd.innerHTML = '<div style="padding:12px;text-align:center;color:#999;">无排片文件，请上传</div>';
          return;
        }
        festivalFiles.forEach(f => {
          const isActive = f.name === excelCurrent;
          const row = document.createElement('div');
          row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:6px 10px;cursor:pointer;border-bottom:1px solid #f5f5f5;${isActive?'background:#e8f4ff;font-weight:bold;':''}`;
          row.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.82rem;" title="${f.name}">${isActive ? '📌 ' : ''}${f.name}</span>
            <span class="excel-del" data-name="${f.name}" title="删除此文件" style="cursor:pointer;color:#e76f24;font-size:1rem;padding:0 4px;flex-shrink:0;margin-left:6px;">✕</span>`;
          dd.appendChild(row);

          // Click file name → switch
          row.querySelector('span:first-child').addEventListener('click', (e) => {
            e.stopPropagation();
            if (f.name === excelCurrent) { toggleExcelDropdown(); return; }
            if (!confirm('切换排片表将重新加载数据，确定切换至 ' + f.name + '？')) return;
            fetch('/api/select_excel', {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({name: f.name})
            }).then(r => r.json()).then(data => {
              if (data.status === 'ok') { window.location.reload(true); }
              else { alert(data.message || '切换失败'); }
            }).catch(err => { alert('请求失败：' + err.message); });
          });

          // Click delete → delete
          row.querySelector('.excel-del').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!confirm('确定要删除 ' + f.name + ' 吗？此操作不可恢复。')) return;
            const isCurrent = (f.name === excelCurrent);
            fetch('/api/delete_excel', {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({name: f.name})
            }).then(r => r.json()).then(data => {
              if (data.status === 'ok') {
                if (isCurrent) {
                  window.location.reload(true);
                } else {
                  refreshExcelSelector();
                  alert(data.message);
                }
              } else { alert(data.message || '删除失败'); }
            }).catch(err => { alert('请求失败：' + err.message); });
          });
        });
      }).catch(() => {});
    }

    function toggleExcelDropdown(e) {
      if (e) e.stopPropagation();
      const dd = document.getElementById('excel-dropdown');
      dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
      if (dd.style.display === 'block') refreshExcelSelector();
    }

    function initExcelSelector() {
      refreshExcelSelector();
      document.getElementById('excel-dropdown-btn').addEventListener('click', toggleExcelDropdown);
      document.addEventListener('click', (e) => {
        const wrap = document.getElementById('excel-dropdown-wrap');
        if (wrap && !wrap.contains(e.target)) {
          document.getElementById('excel-dropdown').style.display = 'none';
        }
      });
    }

    function initMap() {
      if (!amapConfigured || typeof AMap === 'undefined') { console.warn("AMap不可用，跳过地图初始化"); return; }
      try {
        window.map = new AMap.Map('map', { center: [121.473701, 31.230416], zoom: 12 });
        AMap.plugin(['AMap.Riding'], function () { window.ridingService = new AMap.Riding(); });
      } catch (e) {
        console.warn("AMap初始化失败:", e.message);
        window.map = null;
      }
    }

    // ======== Filter Panel ========
    function buildFilterPanel() {
      const allDates = new Set(), allDirectors = new Set(), allUnits = new Set(), allCinemas = new Set();
      uniqueMoviesRaw.forEach(m => {
        (m.dates || []).forEach(d => allDates.add(d));
        allDirectors.add(m.director || '无导演');
        allUnits.add(m.unit || '未知');
        m.cinemas.forEach(c => allCinemas.add(c));
      });

      // Init selected sets (all selected by default)
      selectedDates = new Set(allDates);
      selectedDirectors = new Set(allDirectors);
      selectedUnits = new Set(allUnits);
      selectedCinemas = new Set(allCinemas);

      // Render tags
      const getSet = (group) => {
        if (group === 'date') return selectedDates;
        if (group === 'director') return selectedDirectors;
        if (group === 'unit') return selectedUnits;
        return selectedCinemas;
      };

      const renderTags = (container, items, group) => {
        container.innerHTML = '';
        Array.from(items).sort().forEach(tag => {
          const span = document.createElement('span');
          span.className = 'tag selected';
          span.textContent = tag;
          span.dataset.value = tag;
          span.addEventListener('click', () => {
            if (group === 'date' && span.classList.contains('selected') && selectedDates.size <= 1) {
              alert('至少需要选择一个日期'); return;
            }
            span.classList.toggle('selected');
            const set = getSet(group);
            if (span.classList.contains('selected')) set.add(span.dataset.value);
            else set.delete(span.dataset.value);
            renderMovieGrid();
          });
          container.appendChild(span);
        });
      };

      renderTags(document.getElementById('date-tags'), allDates, 'date');
      renderTags(document.getElementById('director-tags'), allDirectors, 'director');
      renderTags(document.getElementById('unit-tags'), allUnits, 'unit');
      renderTags(document.getElementById('cinema-tags'), allCinemas, 'cinema');

      // Cinema distance filter (requires AMap API key)
      const filterRow = document.getElementById('cinema-filter-row');
      const cinemaArr = Array.from(allCinemas).sort();
      if (amapConfigured) {
        filterRow.innerHTML = `
    <div class="cf-row">
      <span>中心影院:</span>
      <select id="center-cinema-select" style="flex:1;min-width:0;">${cinemaArr.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
    </div>
    <div class="cf-row">
      <span>半径(km):</span>
      <input id="radius-input" type="number" min="0" step="0.1" placeholder="如3" value="" style="width:55px;">
      <button id="apply-cinema-filter" style="background:#4aa0eb;color:#fff;">筛选</button>
      <button id="reset-cinema-filter" style="background:#e76f24;color:#fff;">重置</button>
    </div>
  `;

        document.getElementById('apply-cinema-filter').addEventListener('click', () => {
          const center = document.getElementById('center-cinema-select').value;
          const radius = parseFloat(document.getElementById('radius-input').value);
          if (!center || isNaN(radius) || radius < 0) { alert('请选择中心影院并输入半径'); return; }
          fetch('/filter_cinemas', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ center_cinema: center, radius_km: radius })
          }).then(r => r.json()).then(json => {
            const allowed = new Set(json.cinemas || []);
            document.querySelectorAll('#cinema-tags .tag').forEach(span => {
              if (allowed.has(span.dataset.value)) {
                span.style.display = 'inline-flex'; span.classList.add('selected');
                selectedCinemas.add(span.dataset.value);
              } else {
                span.style.display = 'none'; span.classList.remove('selected');
                selectedCinemas.delete(span.dataset.value);
              }
            });
            renderMovieGrid();
          }).catch(err => { console.error(err); alert('距离筛选失败'); });
        });

        document.getElementById('reset-cinema-filter').addEventListener('click', () => {
          document.getElementById('radius-input').value = '';
          document.querySelectorAll('#cinema-tags .tag').forEach(span => {
            span.style.display = 'inline-flex'; span.classList.add('selected');
            selectedCinemas.add(span.dataset.value);
          });
          renderMovieGrid();
        });
      } else {
        filterRow.innerHTML = '<div class="cf-row" style="color:#999;font-size:0.78rem;padding:2px 4px;">需配置高德API后才能按距离筛选</div>';
      }
    }

    // ======== Movie Grid ========
    function getFilteredMovies() {
      return uniqueMoviesRaw.filter(m => {
        if (searchQuery && !m.title.toLowerCase().includes(searchQuery)) return false;
        const hasDate = (m.dates || []).some(d => selectedDates.has(d));
        if (!hasDate) return false;
        const d = m.director || '无导演';
        const u = m.unit || '未知';
        if (!selectedDirectors.has(d)) return false;
        if (!selectedUnits.has(u)) return false;
        const hasCinema = m.cinemas.some(c => selectedCinemas.has(c));
        if (!hasCinema) return false;
        return true;
      });
    }

    function renderMovieGrid() {
      const grid = document.getElementById('movie-grid');
      const noMsg = document.getElementById('no-movies-msg');
      grid.innerHTML = '';

      const filtered = getFilteredMovies();
      if (filtered.length === 0) {
        noMsg.style.display = 'block'; grid.style.display = 'none'; return;
      }
      noMsg.style.display = 'none'; grid.style.display = 'grid';

      const colors = ['#4aa0eb', '#5b8def', '#6c7cf0', '#7d6bf1', '#8e5af2', '#9f49f3', '#b038f4', '#c127f5', '#d216f6', '#e205f7'];

      filtered.forEach((m, idx) => {
        const card = document.createElement('div');
        card.className = 'movie-card' + (interestList.has(m.key) ? ' interested' : '');
        const scheduleLines = (m.screenings || []).slice(0, 20).map(s =>
          `${s.date} ${s.start_time} @${s.cinema_name}`).join('\n');
        const scheduleInfo = scheduleLines.length > 0 ? scheduleLines
          : (m.dates || []).map(d => `${d}`).join('\n');
        card.title = `${m.title}\n导演：${m.director}\n单元：${m.unit || '未知'}\n──排期──\n${scheduleInfo}`;

        const color = colors[idx % colors.length];
        const isInList = interestList.has(m.key);

        card.innerHTML = `
      <div class="movie-card-left" style="background:${color}">${m.title.charAt(0)}</div>
      <div class="movie-card-body">
        <div class="movie-title">${m.title}</div>
        <div class="movie-meta">${m.director}</div>
        <div class="movie-meta-row">
          <span class="movie-unit-tag">${m.unit || '未知'}</span>
          <span class="movie-count-tag">${m.screening_count}场 · ${m.dates.length}天</span>
        </div>
      </div>
      <button class="interest-toggle${isInList ? ' active' : ''}">${isInList ? '✓' : '+'}</button>
    `;

        card.querySelector('.interest-toggle').addEventListener('click', (e) => {
          e.stopPropagation();
          toggleInterest(m.key);

    const WEEKDAY = ['日', '一', '二', '三', '四', '五', '六'];

    // ======== Timeline Rendering ========
    function formatTimeWithDay(timeStr) {
      let [h, m] = timeStr.split(':').map(Number);
      let day = '';
      if (h >= 24) {
        const dayCount = Math.floor(h / 24);
        h = h % 24;
        day = dayCount === 1 ? '次日' : `第${dayCount}日`;
      }
      return `${day}${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function renderTimelineForDate(dateStr) {
      const container = document.getElementById('timeline-content');
      container.innerHTML = '';
      const data = filteredTimelineData[dateStr];
      if (!data || data.items.length === 0) {
        document.getElementById('scale-min').innerText = '--:--';
        document.getElementById('scale-max').innerText = '--:--';
        return;
      }

      // Cinema → color mapping
      const cinemaColors = {};
      const palette = ['#4aa0eb','#5b8def','#6c7cf0','#e76f24','#f5a623','#34c759',
        '#af52de','#ff3b30','#007aff','#ff9500','#5856d6','#00c7be','#ff2d55','#8e5af2'];
      const getCinemaColor = (cinema) => {
        if (!cinemaColors[cinema]) {
          let hash = 0;
          for (let i = 0; i < cinema.length; i++) hash = ((hash << 5) - hash) + cinema.charCodeAt(i);
          cinemaColors[cinema] = palette[Math.abs(hash) % palette.length];
        }
        return cinemaColors[cinema];
      };

      const items = data.items.map(m => {
        const [sh, sm] = m.start_time.split(':').map(Number);
        const [eh, em] = m.end_time.split(':').map(Number);
        return { ...m, start_min: sh * 60 + sm, end_min: eh * 60 + em };
      });

      const minStart = Math.min(...items.map(x => x.start_min));
      const maxEnd = Math.max(...items.map(x => x.end_min));
      const span = Math.max(maxEnd - minStart, 1);

      const minH = Math.floor(minStart / 60), minM = minStart % 60;
      const maxH = Math.floor(maxEnd / 60), maxMM = maxEnd % 60;
      let prefix = '', displayH = maxH;
      if (maxH >= 24) { displayH = maxH - 24; prefix = '次日'; }
      document.getElementById('scale-min').innerText = `${String(minH).padStart(2, '0')}:${String(minM).padStart(2, '0')}`;
      document.getElementById('scale-max').innerText = `${prefix}${String(displayH).padStart(2, '0')}:${String(maxMM).padStart(2, '0')}`;

      items.sort((a, b) => a.start_min - b.start_min);

      // Time grid lines (each full hour)
      const gridHourStart = Math.ceil(minStart / 60);
      const gridHourEnd = Math.floor(maxEnd / 60);
      for (let h = gridHourStart; h <= gridHourEnd; h++) {
        const pct = ((h * 60 - minStart) / span) * 100;
        const line = document.createElement('div');
        line.style.cssText = `position:absolute;left:${pct}%;top:0;bottom:0;width:1px;border-left:1px dashed #ddd;z-index:0;pointer-events:none;`;
        const label = document.createElement('span');
        label.style.cssText = 'position:absolute;top:-16px;left:-12px;font-size:0.65rem;color:#bbb;white-space:nowrap;';
        const displayHr = h % 24;
        label.innerText = `${String(displayHr).padStart(2,'0')}:00`;
        line.appendChild(label);
        container.appendChild(line);
      }

      items.forEach(item => {
        const offsetPct = (item.start_min - minStart) / span * 100;
        const widthPct = (item.end_min - item.start_min) / span * 100;

        const rowDiv = document.createElement('div');
        rowDiv.className = 'timeline-row';

        const cinemaColor = getCinemaColor(item.cinema_name);

        const movieDiv = document.createElement('div');
        movieDiv.className = 'movie-item';
        movieDiv.dataset.id = item.id;
        movieDiv.dataset.title = item.title;
        movieDiv.dataset.date = dateStr;
        movieDiv.dataset.start_time = item.start_time;
        movieDiv.dataset.end_time = item.end_time;
        movieDiv.dataset.cinema_name = item.cinema_name;
        movieDiv.dataset.cinema_address = item.cinema_address;
        movieDiv.style.left = offsetPct + '%';
        movieDiv.style.width = Math.max(widthPct, 2) + '%';
        movieDiv.style.background = cinemaColor;
        movieDiv.style.borderColor = cinemaColor;
        movieDiv.innerText = `${item.title} @${item.cinema_name}`;
        if (selectedMovies.some(m => m.id === item.id)) {
          movieDiv.classList.add('selected');
        }

        movieDiv.title =
          `双击打开豆瓣搜索\n\n` +
          `名称：${item.title}\n导演：${item.director}\n单元：${item.unit}\n` +
          `时间：${item.start_time} - ${formatTimeWithDay(item.end_time)}\n` +
          `影院：${item.cinema_name}\n地址：${item.cinema_address}`;

        movieDiv.addEventListener('click', function (e) {
          const id = parseInt(this.dataset.id);
          const idx = selectedMovies.findIndex(m => m.id === id);
          if (idx === -1) {
            selectedMovies.push({
              id, title: this.dataset.title, date: this.dataset.date,
              start_time: this.dataset.start_time, end_time: this.dataset.end_time,
              cinema_name: this.dataset.cinema_name, cinema_address: this.dataset.cinema_address,
              selected_order: ++selectionSequence
            });
            this.classList.add('selected');
          } else {
            selectedMovies.splice(idx, 1);
            this.classList.remove('selected');
          }
          invalidateRoute();
          updateSelectionActions();
          e.stopPropagation();
        });

        movieDiv.addEventListener('dblclick', function (e) {
          const q = encodeURIComponent(item.title.replace(/\(4K\)/g, ''));
          window.open(`https://www.douban.com/search?cat=1002&q=${q}`, '_blank');
          e.stopPropagation();
        });

        // "Other showtimes" button
        const infoBtn = document.createElement('span');
        infoBtn.innerText = '🔍';
        infoBtn.title = '查看其他排期';
        infoBtn.style.cssText = 'position:absolute;top:4px;right:4px;font-size:1rem;background:rgba(0,0,0,0.5);color:#fff;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:5;cursor:pointer;';
        infoBtn.addEventListener('mouseenter', () => { infoBtn.style.transform = 'scale(1.1)'; });
        infoBtn.addEventListener('mouseleave', () => { infoBtn.style.transform = 'scale(1)'; });
        infoBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          showOtherShowtimes(item.title, dateStr, item.start_time, item.cinema_name);
        });
        movieDiv.appendChild(infoBtn);
        rowDiv.appendChild(movieDiv);
        container.appendChild(rowDiv);
      });
    }

    // ======== Itinerary Preview / Export ========
    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = String(timeStr || '0:0').split(':').map(Number);
      return (h || 0) * 60 + (m || 0);
    }

    function formatGapMinutes(mins) {
      if (mins < 0) return '时间重叠';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h <= 0) return `${m} 分钟`;
      if (m === 0) return `${h} 小时`;
      return `${h} 小时 ${m} 分钟`;
    }

    function sortedSelectedMovies() {
      return [...selectedMovies].sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        const timeDiff = parseTimeToMinutes(a.start_time) - parseTimeToMinutes(b.start_time);
        if (timeDiff !== 0) return timeDiff;
        return (a.selected_order || 0) - (b.selected_order || 0);
      });
    }

    function groupMoviesByDate(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.date]) acc[item.date] = [];
        acc[item.date].push(item);
        return acc;
      }, {});
    }

    function sortScreenings(items) {
      return [...items].sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        const timeDiff = parseTimeToMinutes(a.start_time) - parseTimeToMinutes(b.start_time);
        if (timeDiff !== 0) return timeDiff;
        return (a.selected_order || 0) - (b.selected_order || 0);
      });
    }

    function buildConflictBlocks(dayItems) {
      const sorted = sortScreenings(dayItems);
      const blocks = [];
      let current = null;
      sorted.forEach((item) => {
        const start = parseTimeToMinutes(item.start_time);
        const end = parseTimeToMinutes(item.end_time);
        if (!current || start >= current.maxEnd) {
          current = { items: [item], maxEnd: end };
          blocks.push(current);
        } else {
          current.items.push(item);
          current.maxEnd = Math.max(current.maxEnd, end);
        }
      });
      return blocks;
    }

    function alternativeKey(items) {
      if (!items.length) return '';
      return `${items[0].date}|${items.map(item => item.id).sort((a, b) => a - b).join('-')}`;
    }

    function getAlternativeActive(items) {
      const key = alternativeKey(items);
      const savedId = Number(alternativeChoices[key]);
      const saved = items.find(item => item.id === savedId);
      if (saved) return saved;
      return [...items].sort((a, b) => (a.selected_order || 0) - (b.selected_order || 0))[0] || items[0];
    }

    function getEffectiveSelectedMovies() {
      const byDate = groupMoviesByDate(selectedMovies);
      const effective = [];
      Object.keys(byDate).sort().forEach((date) => {
        buildConflictBlocks(byDate[date]).forEach((block) => {
          effective.push(block.items.length > 1 ? getAlternativeActive(block.items) : block.items[0]);
        });
      });
      return sortScreenings(effective);
    }

    function invalidateRoute(markRefresh = true) {
      if (lastRouteData && markRefresh) routeNeedsRefresh = true;
      lastRouteData = null;
      if (window.map && typeof window.map.clearMap === 'function') window.map.clearMap();
    }

    function buildDayPlan(dayItems) {
      const blocks = buildConflictBlocks(dayItems);
      const plan = [];
      blocks.forEach((block) => {
        const item = block.items.length > 1 ? getAlternativeActive(block.items) : block.items[0];
        const alternatives = block.items.length > 1 ? block.items : null;
        const last = plan[plan.length - 1];
        if (!alternatives && last && last.type === 'visit' && !last.alternatives && last.cinema_address === item.cinema_address) {
          last.items.push(item);
          last.end_time = item.end_time;
        } else {
          plan.push({
            type: 'visit',
            date: item.date,
            cinema_name: item.cinema_name,
            cinema_address: item.cinema_address,
            start_time: item.start_time,
            end_time: item.end_time,
            items: [item],
            alternatives,
          });
        }
      });
      return plan;
    }

    function findConflictGroups(items) {
      const byDate = groupMoviesByDate(items);
      return Object.keys(byDate).sort().flatMap((date) =>
        buildConflictBlocks(byDate[date])
          .filter(block => block.items.length > 1)
          .map(block => ({ date, items: block.items }))
      );
    }

    function describeConflictGroup(group) {
      return `${group.date}：${group.items.map(m => `${m.start_time} ${m.title}`).join(' / ')}`;
    }

    function chooseAlternative(groupKey, movieId) {
      alternativeChoices[groupKey] = Number(movieId);
      invalidateRoute(true);
      renderItineraryPanel();
    }

    function updateSelectionActions() {
      const count = selectedMovies.length;
      const effectiveCount = getEffectiveSelectedMovies().length;
      const routeBtn = document.getElementById('show-map-btn');
      routeBtn.style.display = amapConfigured ? '' : 'none';
      routeBtn.disabled = effectiveCount < 2;
      routeBtn.innerText = effectiveCount >= 2 ? `路线规划 (${effectiveCount}场)` : '路线规划';
      document.getElementById('export-itinerary-btn').disabled = count === 0;
      renderItineraryPanel();
    }

    function renderScreeningRows(items) {
      return items.map((m) => `<div class="itinerary-screening">
        <div class="itinerary-title">${escapeHtml(m.title)}</div>
        <div class="itinerary-meta">${escapeHtml(m.start_time)} - ${escapeHtml(formatTimeWithDay(m.end_time))}</div>
      </div>`).join('');
    }

    function renderAlternativeControls(entry) {
      if (!entry.alternatives) return '';
      const key = alternativeKey(entry.alternatives);
      const activeId = entry.items[0].id;
      return `<div class="alternative-options">
        ${entry.alternatives.map((m) => `<button type="button" class="alt-choice-btn ${m.id === activeId ? 'active' : ''}" data-alt-group="${escapeHtml(key)}" data-alt-id="${m.id}">
          ${m.id === activeId ? '当前采用：' : '切换为：'}${escapeHtml(m.start_time)}-${escapeHtml(formatTimeWithDay(m.end_time))} ${escapeHtml(m.title)} @ ${escapeHtml(m.cinema_name)}
        </button>`).join('')}
      </div>`;
    }

    function transferKey(fromVisit, toVisit) {
      return `${fromVisit.end_time}|${toVisit.start_time}|${fromVisit.cinema_address}|${toVisit.cinema_address}`;
    }

    function renderTransfer(prevVisit, nextVisit, transferLookup) {
      if (!prevVisit || !nextVisit || prevVisit.date !== nextVisit.date) return '';
      const gap = parseTimeToMinutes(nextVisit.start_time) - parseTimeToMinutes(prevVisit.end_time);
      const gapText = formatGapMinutes(gap);
      const route = transferLookup[transferKey(prevVisit, nextVisit)];
      if (prevVisit.cinema_address === nextVisit.cinema_address) {
        return `<div class="itinerary-transfer ready">同影院，间隔 ${escapeHtml(gapText)}</div>`;
      }
      const cls = gap < 20 ? 'tight' : 'ready';
      const routeText = route ? `；${escapeHtml(route)}` : (amapConfigured ? '；尚未规划路线' : '');
      return `<div class="itinerary-transfer ${cls}">换场间隔 ${escapeHtml(gapText)}${routeText}</div>`;
    }

    function renderItineraryPanel() {
      const list = document.getElementById('itinerary-list');
      if (!list) return;

      const items = sortedSelectedMovies();
      if (items.length === 0) {
        list.innerHTML = '<div class="itinerary-empty">点击时间线里的场次后，这里会按天生成行程单。</div>';
        return;
      }

      const conflictGroups = findConflictGroups(items);
      const transferLookup = buildTransferLookup();
      const byDate = groupMoviesByDate(items);
      let html = `<div class="itinerary-summary">
        <div class="itinerary-summary-title">观影计划</div>
        <div class="itinerary-summary-meta">
          已选 ${items.length} 场${conflictGroups.length ? `，含 ${conflictGroups.length} 组备选，当前行程采用 ${getEffectiveSelectedMovies().length} 场` : ''}
          ${routeNeedsRefresh ? '，行程已调整，请重新路线规划' : (lastRouteData ? '，已合并路线信息' : (amapConfigured ? '，点击路线规划可补充换场信息' : '，未配置地图 Key，仅生成行程'))}
        </div>
      </div>`;
      Object.keys(byDate).sort().forEach((date) => {
        const plan = buildDayPlan(byDate[date]);
        html += `<section class="itinerary-day">
          <div class="itinerary-day-title">
            <span>${escapeHtml(date)}</span>
            <span class="itinerary-day-count">${byDate[date].length} 场</span>
          </div>`;
        plan.forEach((entry, idx) => {
          const prevVisit = [...plan.slice(0, idx)].reverse().find(x => x.type === 'visit');
          html += renderTransfer(prevVisit, entry, transferLookup);
          html += `<article class="itinerary-item ${entry.items.length > 1 ? 'same-cinema' : ''} ${entry.alternatives ? 'conflict' : ''}">
              <div class="itinerary-time">${escapeHtml(entry.start_time)}<br>${escapeHtml(formatTimeWithDay(entry.end_time))}</div>
              <div>
                <div class="itinerary-title">${escapeHtml(entry.cinema_name)}
                  ${entry.items.length > 1 ? '<span class="itinerary-badge">同影院连续</span>' : ''}
                  ${entry.alternatives ? '<span class="itinerary-badge warn">备选组</span>' : ''}
                </div>
                <div class="itinerary-meta">${escapeHtml(entry.cinema_address || '')}</div>
                ${renderScreeningRows(entry.items)}
                ${renderAlternativeControls(entry)}
              </div>
            </article>`;
        });
        html += '</section>';
      });
      list.innerHTML = html;
      list.querySelectorAll('.alt-choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => chooseAlternative(btn.dataset.altGroup, btn.dataset.altId));
      });
    }

    function buildTransferLookup() {
      const lookup = {};
      if (!lastRouteData || !Array.isArray(lastRouteData.points) || !Array.isArray(lastRouteData.distances)) {
        return lookup;
      }
      lastRouteData.distances.forEach((seg) => {
        if (seg.cross_day) return;
        const from = lastRouteData.points[seg.from_index];
        const to = lastRouteData.points[seg.to_index];
        if (!from || !to) return;
        const key = `${from.movie_end}|${to.movie_start}|${from.address}|${to.address}`;
        const parts = [];
        if (seg.distance_km != null) parts.push(`${seg.distance_km.toFixed(1)} km`);
        if (seg.bike_duration_min != null) parts.push(`骑行 ${seg.bike_duration_min} 分钟`);
        if (seg.transit_duration_min != null) parts.push(`公交 ${seg.transit_duration_min} 分钟`);
        lookup[key] = parts.join(' / ');
      });
      return lookup;
    }

    function buildItineraryText() {
      const items = sortedSelectedMovies();
      const byDate = groupMoviesByDate(items);
      const transferLookup = buildTransferLookup();
      const conflictGroups = findConflictGroups(items);
      const lines = ['电影节观影行程单', ''];
      if (conflictGroups.length) {
        lines.push('注意：以下行程包含时间重叠的备选影片，行程中只采用每组当前选中的一部，其余作为备选保留。');
        conflictGroups.forEach((group, idx) => {
          const active = getAlternativeActive(group.items);
          lines.push(`  备选组 ${idx + 1}：当前采用 ${active.start_time} ${active.title}；全部备选：${group.items.map(m => `${m.start_time} ${m.title}`).join(' / ')}`);
        });
        lines.push('');
      }

      Object.keys(byDate).sort().forEach((date) => {
        lines.push(date);
        const plan = buildDayPlan(byDate[date]);
        plan.forEach((entry, idx) => {
          const prevVisit = [...plan.slice(0, idx)].reverse().find(x => x.type === 'visit');
          if (entry.type === 'visit') {
            if (prevVisit && prevVisit.date === entry.date) {
              const gap = parseTimeToMinutes(entry.start_time) - parseTimeToMinutes(prevVisit.end_time);
              const route = transferLookup[transferKey(prevVisit, entry)];
              const transfer = route ? `；换乘 ${route}` : (prevVisit.cinema_address === entry.cinema_address ? '；同影院' : '');
              lines.push(`  间隔 ${formatGapMinutes(gap)}${transfer}`);
            }
            lines.push(`  ${entry.start_time}-${formatTimeWithDay(entry.end_time)}  ${entry.cinema_name}`);
            if (entry.cinema_address) lines.push(`  ${entry.cinema_address}`);
            entry.items.forEach((m) => lines.push(`    ${m.start_time}-${formatTimeWithDay(m.end_time)}  ${m.title}`));
            if (entry.alternatives) {
              lines.push('    本时段其它备选：');
              entry.alternatives.filter(m => m.id !== entry.items[0].id).forEach((m) => {
                lines.push(`      ${m.start_time}-${formatTimeWithDay(m.end_time)}  ${m.title} @ ${m.cinema_name}`);
              });
            }
          } else {
            entry.items.forEach((m) => {
              lines.push(`    ${m.start_time}-${formatTimeWithDay(m.end_time)}  ${m.title}`);
              lines.push(`    ${m.cinema_name}`);
            });
          }
        });
        lines.push('');
      });
      return lines.join('\n');
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportItinerary() {
      if (selectedMovies.length === 0) return;
      const firstDate = sortedSelectedMovies()[0]?.date || 'festival';
      downloadFile(`film-itinerary-${firstDate}.txt`, buildItineraryText(), 'text/plain;charset=utf-8');
    }

    // ======== Route Planning ========
    function clearMapAndInfo() {
      document.querySelectorAll('.movie-item.selected').forEach(el => el.classList.remove('selected'));
      alternativeChoices = {};
      lastRouteData = null;
      routeNeedsRefresh = false;
      updateSelectionActions();
      if (window.map && typeof window.map.clearMap === 'function') window.map.clearMap();
    }

    function hasTimeConflict(selected) {
      const groups = findConflictGroups(selected);
      if (groups.length === 0) return { conflict: false };
      return { conflict: true, groups };
    }

    function onShowMap() {
      const routeMovies = getEffectiveSelectedMovies();
      if (routeMovies.length < 2) { alert('请至少选中两个有效场次'); return; }

      fetch('/route_info', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selected_movies: routeMovies })
      }).then(r => r.json()).then(json => {
        if (!json.points || !json.distances) throw new Error('后端返回格式不正确');
        lastRouteData = json;
        routeNeedsRefresh = false;
        renderItineraryPanel();
        drawMapWithRoutes(json);
      }).catch(err => { console.error(err); alert('获取路线信息失败'); });
    }

    function drawMapWithRoutes(data) {
      const pts = data.points, dists = data.distances;
      if (!window.map || typeof window.map.clearMap !== 'function') { alert('地图未初始化'); return; }
      window.map.clearMap();
      if (pts.length > 0 && pts[0].lng !== null && pts[0].lat !== null) {
        window.map.setCenter([pts[0].lng, pts[0].lat]);
      }

      // Point markers
      pts.forEach((p, idx) => {
        if (p.lng == null || p.lat == null) return;
        new AMap.Marker({
          position: [p.lng, p.lat], map: window.map,
          label: { content: (idx + 1).toString(), offset: new AMap.Pixel(0, 0) }
        });
      });

      if (!window.ridingService) return;

      // Interleaved: point → transfer → point → transfer → ...
      let html = '<div style="font-weight:bold;font-size:0.9rem;margin-bottom:10px;color:#333;">📍 路线规划</div>';
      pts.forEach((p, idx) => {
        // Point card
        html += `<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 8px;background:#f8f8f8;border-radius:4px;border-left:3px solid #4aa0eb;margin-bottom:6px;">
      <span style="background:#4aa0eb;color:#fff;border-radius:50%;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;flex-shrink:0;">${idx + 1}</span>
      <div style="min-width:0;">
        <div style="font-weight:bold;font-size:0.82rem;">${p.cinema_name}</div>
        <div style="font-size:0.78rem;color:#666;">🎬 ${p.movie_title}</div>
        <div style="font-size:0.75rem;color:#999;">${p.date || ''} ${p.movie_start} — ${p.movie_end}</div>
      </div>
    </div>`;

        // Transfer guide (to next point)
        if (idx < pts.length - 1) {
          const p1 = p, p2 = pts[idx + 1];
          const seg = dists.find(d => d.from_index === idx);
          if (seg && seg.cross_day) {
            html += `<div style="margin:8px 0 10px 14px;padding:6px 10px;border-radius:6px;background:#eef2ff;color:#475569;font-size:0.78rem;">下一天：${p2.date || ''}</div>`;
            return;
          }
          if (p1.lng != null && p2.lng != null) {
            if (seg) {
              let gapMin = 0;
              try {
                const e1 = parseInt(p1.movie_end.split(':')[0]) * 60 + parseInt(p1.movie_end.split(':')[1]);
                const s2 = parseInt(p2.movie_start.split(':')[0]) * 60 + parseInt(p2.movie_start.split(':')[1]);
                gapMin = Math.max(s2 - e1, 0);
              } catch { }
              const distKm = seg.distance_km != null ? seg.distance_km : null;
              const bikeMin = seg.bike_duration_min != null ? seg.bike_duration_min : null;
              const busMin = seg.transit_duration_min != null ? seg.transit_duration_min : null;
              const gapColor = gapMin < 15 ? '#e76f24' : gapMin < 30 ? '#f5a623' : '#4aa0eb';

              html += `<div style="border:1px dashed #ddd;border-radius:6px;padding:6px 10px;margin:4px 0 8px 14px;background:#fafafa;font-size:0.78rem;">
            <div style="color:#999;margin-bottom:4px;">⬇ ${idx + 1} → ${idx + 2} 换乘</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;">
              <span style="color:#888;">⏱ 间隔</span><span style="color:${gapColor};font-weight:bold;">${gapMin} 分钟</span>
              <span style="color:#888;">🚲 骑行</span><span>${distKm != null ? distKm.toFixed(1) + ' km / ' + bikeMin + '分钟' : '—'}</span>
              <span style="color:#888;">🚌 公交</span><span>${busMin != null ? busMin + ' 分钟' : '—'}</span>
            </div>
          </div>`;

              window.ridingService.search([p1.lng, p1.lat], [p2.lng, p2.lat], function (status, result) {
                if (status === 'complete' && result.routes && result.routes.length) {
                  const path = result.routes[0].steps.flatMap(st => st.path);
                  new AMap.Polyline({ map: window.map, path: path, showDir: true, strokeWeight: 4, strokeOpacity: 0.7 });
                }
              });
            }
          }
        }
      });

    }

    // ======== Event Bindings ========
    function bindEvents() {
      document.getElementById('show-timeline-btn').addEventListener('click', showTimelineMode);
      document.getElementById('filter-btn').addEventListener('click', backToBrowse);
      document.getElementById('cart-badge').addEventListener('click', toggleCartDropdown);
      document.getElementById('show-map-btn').addEventListener('click', onShowMap);
      document.getElementById('export-itinerary-btn').addEventListener('click', exportItinerary);

      // Browse select-all / deselect-all for filtered movies
      document.getElementById('browse-select-all').addEventListener('click', () => {
        getFilteredMovies().forEach(m => interestList.add(m.key));
        updateCartBadge();
        renderMovieGrid();
      });
      document.getElementById('browse-deselect-all').addEventListener('click', () => {
        getFilteredMovies().forEach(m => interestList.delete(m.key));
        updateCartBadge();
        renderMovieGrid();
      });
      document.getElementById('btn-clear-selection').addEventListener('click', () => {
        selectedMovies = []; clearMapAndInfo();
      });

      // Search
      let searchTimer;
      document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          searchQuery = e.target.value.trim().toLowerCase();
          renderMovieGrid();
        }, 300);
      });

      // Group select/deselect
      const getSetByName = (grp) => {
        if (grp === 'date') return selectedDates;
        if (grp === 'director') return selectedDirectors;
        if (grp === 'unit') return selectedUnits;
        return selectedCinemas;
      };
      document.querySelectorAll('.btn-select-all').forEach(btn => {
        btn.addEventListener('click', () => {
          const grp = btn.dataset.group;
          const container = document.getElementById(grp + '-tags');
          const set = getSetByName(grp);
          container.querySelectorAll('.tag').forEach(span => {
            if (span.style.display !== 'none') { span.classList.add('selected'); set.add(span.dataset.value); }
          });
          renderMovieGrid();
        });
      });
      document.querySelectorAll('.btn-deselect-all').forEach(btn => {
        btn.addEventListener('click', () => {
          const grp = btn.dataset.group;
          const container = document.getElementById(grp + '-tags');
          const set = getSetByName(grp);
          // Date group: keep at least 1 selected
          if (grp === 'date') {
            const visible = container.querySelectorAll('.tag:not([style*="display:none"])');
            if (visible.length <= 1) { alert('至少需要选择一个日期'); return; }
          }
          container.querySelectorAll('.tag').forEach(span => {
            span.classList.remove('selected'); set.delete(span.dataset.value);
          });
          renderMovieGrid();
        });
      });

      // Collapse toggles
      ['date', 'director', 'unit', 'cinema'].forEach(grp => {
        document.getElementById(grp + '-header').addEventListener('click', () => {
          const content = document.getElementById(grp + '-tags');
          const header = document.getElementById(grp + '-header');
          const isCollapsed = content.classList.toggle('collapsed');
          if (isCollapsed) {
            header.innerText = '▶ ' + header.innerText.replace(/[▶▼]\s*/, '');
          } else {
            header.innerText = '▼ ' + header.innerText.replace(/[▶▼]\s*/, '');
          }
        });
      });

      // Settings
      document.getElementById('settings-btn').addEventListener('click', openSettingsModal);
      document.getElementById('btn-settings-cancel').addEventListener('click', closeSettingsModal);
      document.getElementById('settings-modal-overlay').addEventListener('click', closeSettingsModal);
      document.getElementById('btn-settings-save').addEventListener('click', saveSettings);

      // Divider drag
      initDivider();
    }

    function openSettingsModal() {
      document.getElementById('cfg-status').style.display = 'none';
      fetch('/api/config').then(r => r.json()).then(data => {
        const c = data.config || {};
        document.getElementById('cfg-amap-key').value = c.amap_key || '';
        document.getElementById('cfg-jsapi-key').value = c.amap_jsapi_key || '';
        document.getElementById('cfg-security-code').value = c.amap_security_code || '';
      }).catch(() => { });
      document.getElementById('settings-modal-overlay').style.display = 'block';
      document.getElementById('settings-modal-dialog').style.display = 'block';
    }

    function closeSettingsModal() {
      document.getElementById('settings-modal-overlay').style.display = 'none';
      document.getElementById('settings-modal-dialog').style.display = 'none';
    }

    function saveSettings() {
      const payload = {
        amap_key: document.getElementById('cfg-amap-key').value.trim(),
        amap_jsapi_key: document.getElementById('cfg-jsapi-key').value.trim(),
        amap_security_code: document.getElementById('cfg-security-code').value.trim(),
      };
      const st = document.getElementById('cfg-status');
      fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        .then(r => r.json()).then(data => {
          if (data.status === 'ok') {
            st.style.color = '#4aa0eb'; st.innerText = '保存成功，正在刷新...'; st.style.display = 'block';
            setTimeout(() => window.location.reload(true), 800);
          } else {
            st.style.color = '#e76f24'; st.innerText = data.message || '保存失败'; st.style.display = 'block';
          }
        }).catch(err => { st.style.color = '#e76f24'; st.innerText = '请求失败：' + err.message; st.style.display = 'block'; });
    }

    // Divider
    function initDivider() {
      const divider = document.getElementById('divider');
      let isDragging = false, startY = 0, startHeight = 0;
      divider.addEventListener('mousedown', function (e) {
        isDragging = true; startY = e.clientY;
        startHeight = document.getElementById('timeline-wrapper-tv').getBoundingClientRect().height;
        document.body.style.cursor = 'row-resize'; e.preventDefault();
      });
      document.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        let newH = startHeight + (e.clientY - startY);
        const minH = 100, maxH = window.innerHeight * 0.8;
        if (newH < minH) newH = minH;
        if (newH > maxH) newH = maxH;
        document.getElementById('timeline-wrapper-tv').style.height = newH + 'px';
        e.preventDefault();
      });
      document.addEventListener('mouseup', function () {
        if (isDragging) { isDragging = false; document.body.style.cursor = 'default'; }
      });
    }

    window.onload = initPage;
  </script>
